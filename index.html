<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System Explorer</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for premium UI text -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
</head>
<body>
    <div id="ui-container">
        <h1>Celestial 3D Explorer</h1>
        <p>Professional Earth Data. Zoom all the way into cities!</p>
        <div class="controls-hint" style="margin-bottom: 1rem;">
            <div class="hint-item">🌍 Realistic Sun & Atmosphere</div>
            <div class="hint-item">🔍 High-Res Satellite Imagery</div>
        </div>
        
        <form id="search-form" style="display: flex; gap: 0.5rem;">
            <input type="text" id="search-input" placeholder="Fly to a city... (e.g. Paris)" style="flex: 1; padding: 0.5rem; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white;">
            <button type="submit" style="padding: 0.5rem 1rem; border-radius: 4px; border: none; background: #60a5fa; color: white; cursor: pointer; font-weight: bold;">Go</button>
        </form>
    </div>
    
    <div id="canvas-container" style="width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;"></div>
    
    <script src="main.js"></script>
</body>
</html>
