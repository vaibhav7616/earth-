<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Celestial Explorer | Premium Solar System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <!-- Leaflet for Satellite View -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Initializing Universe...</p>
    </div>

    <!-- Map Overlay for Zoom-in -->
    <div id="map-overlay"></div>

    <div id="ui-container">
        <div class="header">
            <span class="badge">NASA Visual Standard</span>
            <h1>Solaris Elite</h1>
            <p>High-Fidelity Planetary Explorer</p>
        </div>

        <div class="search-container">
            <input type="text" id="place-search" placeholder="Search Earth (e.g. New York, Paris)...">
            <button id="search-btn">🔍</button>
            <div id="search-results"></div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <span class="label">Target</span>
                <span class="value" id="orbiting-body">Interstellar Space</span>
            </div>
            <div class="stat-card">
                <span class="label">Zoom</span>
                <span class="value" id="zoom-value">Analyzing...</span>
            </div>
        </div>

        <div class="controls-hint">
            <div class="hint-item">
                <span class="icon">🌍</span>
                <div class="text">
                    <strong>Click Earth</strong>
                    <span>To activate Google Map mode</span>
                </div>
            </div>
        </div>
        
        <div class="footer-note">
            Real-time SDO Solar Simulation & ESRI Satellite Engine
        </div>
    </div>
    
    <div id="canvas-container"></div>
    
    <script src="main.js"></script>
</body>
</html>
