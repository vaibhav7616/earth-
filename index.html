<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Import Map for Three.js so browser can resolve 'three' and 'three/addons/' -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <h1>Solar System Explorer</h1>
        <p>Interactive 3D Universe</p>
        <div class="controls-hint" style="margin-bottom: 1rem;">
            <div class="hint-item">☀️ Realistic Sun & Glow</div>
            <div class="hint-item">🪐 All Planets included</div>
            <div class="hint-item">🖱️ Click & Drag to view all</div>
        </div>
        
        <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 10px;">
           <i>Note: Switching to a full Solar System means we trade street/house level zooming on Earth for a complete 3D orbital space simulation.</i>
        </p>
    </div>
    
    <div id="canvas-container"></div>
    
    <!-- ES Module script -->
    <script type="module" src="main.js"></script>
</body>
</html>
